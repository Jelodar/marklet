<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #212529;
      --text-muted: #666666;
      --border-color: #eeeeee;
      --hover-bg: #f5f5f5;
      --card-bg: #ffffff;
      --primary-color: #007bff;
      --secondary-bg: #f9f9f9;
      --switch-bg: #ccc;
    }

    [data-theme="dark"] {
      --bg-color: #1e1e1e;
      --text-color: #e0e0e0;
      --text-muted: #999999;
      --border-color: #333333;
      --hover-bg: #3a3a3a;
      --card-bg: #252525;
      --primary-color: #3b82f6;
      --secondary-bg: #2d2d2d;
      --switch-bg: #444;
    }

    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    h2 {
      margin: 0;
      font-size: 18px;
      cursor: pointer;
    }
    .toggle-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      transition: opacity 0.3s;
    }
    .toggle-container.disabled {
      opacity: 0.5;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--switch-bg);
      transition: .4s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: var(--primary-color);
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    .section-title {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin: 16px 0 8px;
    }
    #highlights-list {
      max-height: 250px;
      overflow-y: auto;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 4px;
      background-color: var(--card-bg);
    }
    .highlight-item {
      font-size: 13px;
      padding: 8px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .highlight-item:last-child {
      border-bottom: none;
    }
    .highlight-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-style: italic;
      color: var(--text-color);
      opacity: 0.9;
    }
    .highlight-actions {
      display: flex;
      gap: 8px;
    }
    .action-btn {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
      border: 1px solid var(--border-color);
      background: var(--card-bg);
      cursor: pointer;
      color: var(--text-color);
    }
    .action-btn:hover {
      background: var(--hover-bg);
      border-color: var(--text-muted);
    }

    .action-btn.row {
      width: 100%;
    }

    .btn-delete:hover {
      color: #ff4d4d;
      border-color: #ff4d4d;
    }
    @keyframes flash {
      0% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(0, 123, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 123, 255, 0); }
    }
    .flash-highlight .slider {
      animation: flash 1s;
    }
    
    #open-settings {
      background: none; 
      border: none; 
      cursor: pointer; 
      padding: 4px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      color: var(--text-muted); 
      transition: color 0.2s;
    }
    #open-settings:hover {
      color: var(--primary-color);
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }

    .data-row {
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      padding: 4px 0;
    }
    .data-info {
      font-size: 12px;
      color: var(--text-color);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .count-badge {
      background: var(--switch-bg);
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <label class="switch" title="Enable Extension (Global)">
        <input type="checkbox" id="extension-enable-toggle" checked>
        <span class="slider"></span>
      </label>
      <h2 id="app-title-label">Marklet</h2>
    </div>
    <button id="open-settings" title="Settings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </div>

  <div class="toggle-container" id="site-enable-container">
    <span id="site-enable-label">Enable on this Site</span>
    <label class="switch">
      <input type="checkbox" id="site-enable-toggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-container" id="selection-toolbar-container">
    <span>Selection Toolbar</span>
    <label class="switch">
      <input type="checkbox" id="selection-toolbar-toggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-container" id="highlights-visibility-container">
    <span>Show Highlights</span>
    <label class="switch">
      <input type="checkbox" id="highlights-visibility" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-container" id="drawings-visibility-container">
    <span>Show Drawings</span>
    <label class="switch">
      <input type="checkbox" id="drawings-visibility" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-container" id="whiteboard-container">
    <span>Whiteboard Mode</span>
    <label class="switch">
      <input type="checkbox" id="whiteboard-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-container" id="selection-override-container">
    <button id="override-select-btn" class="action-btn row" style="padding: 4px 8px;">Make All Text Selectable</button>
  </div>

  <div id="default-settings-container" style="padding: 8px; background: var(--secondary-bg); border-radius: 4px; display: flex; flex-direction: column; gap: 4px;">
    <div class="data-row">
      <div class="data-info">
        <span>Highlights</span>
        <span id="highlights-count" class="count-badge">0</span>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <button id="clear-all-highlights" class="action-btn btn-delete" style="font-size: 10px; padding: 1px 6px;">Clear All</button>
        <input type="color" id="default-highlight-color" value="#ffff00" title="Default Highlight Color">
      </div>
    </div>
    <div class="data-row">
      <div class="data-info">
        <span>Drawings</span>
        <span id="drawings-count" class="count-badge">0</span>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <button id="clear-all-drawings" class="action-btn btn-delete" style="font-size: 10px; padding: 1px 6px;">Clear All</button>
        <input type="color" id="default-draw-color" value="#ff0000" title="Default Drawing Color">
      </div>
    </div>
  </div>

  <div class="section-title">
    <span>Current Page Highlights</span>
  </div>
  <div id="highlights-list">
    <div style="color: var(--text-muted); text-align: center; padding: 10px;">No highlights yet</div>
  </div>

  <script src="../utils/tiny-idb.js"></script>
  <script src="../utils/page-storage.js"></script>
  <script src="../utils/shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
